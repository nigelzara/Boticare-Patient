
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boticare Health App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Figtree', 'sans-serif'],
            },
            colors: {
              'boticare-primary': '#0D0D0D',
              'boticare-green': '#D3F4E5',
              'boticare-green-dark': '#1E855A',
              'boticare-yellow': '#FBF2D4',
              'boticare-yellow-dark': '#B58D21',
              'boticare-red': '#FADDE1',
              'boticare-red-dark': '#A93248',
              'boticare-blue': '#DDEBFF',
              'boticare-blue-dark': '#3B82F6',
              'boticare-gray': '#F7F7F7',
              'boticare-gray-medium': '#E5E7EB',
              'boticare-gray-dark': '#6B7280',
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-in-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(-10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",

    "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/+esm"
  }
}
</script>
